<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="./style.css">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <style>
        #speaker-photo {
            object-fit: cover;
            width: 4.8cm;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <span class="banner" style="flex: 8;">MATH FRONTIER SEMINAR</span>
        <img id="logo" src="./RPI_Logo_Default.svg" alt="RPI logo">
        <span class="banner" style="flex: 1;"></span>
    </div>

    <div id="flyer">
        <h1 id="title">Sample Seminar Title</h1>

        <div id="speaker-block">
            <img id="speaker-photo" src="./speaker_photos/sample.jpeg" alt="Sample speaker photo">

            <div id="info-block">
                <span id="speaker-name">Sample Speaker</span>
                <span id="affiliation">Sample Affiliation</span>

                <div id="venue-block">
                    <table>
                        <tr>
                            <td>Time</td>
                            <td>Sample Time</td>
                        </tr>
                        <tr>
                            <td>Location</td>
                            <td>Sample Location</td>
                        </tr>
                        <tr>
                            <td>Food</td>
                            <td>Sample Food</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <div style="margin-top: 1em;">
            <h3 style="border-bottom: 4px solid black; padding-bottom:4pt;">Abstract</h3>
            <p id="abstract">
                Sample abstract
            </p>
        </div>        

        <div id="bio-block">
            <h3>About the Speaker</h3>
            <p id="bio">
                Sample bio
            </p>
        </div>
    </div>

    <div id="bottom"></div>
</body>
</html>
